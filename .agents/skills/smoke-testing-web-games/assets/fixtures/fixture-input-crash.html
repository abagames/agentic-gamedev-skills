<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>fixture-input-crash</title>
  </head>
  <body style="background: #ddd">
    <canvas id="c" width="400" height="300"></canvas>
    <script>
      // Reproduces the "passes idle, crashes on input" bug class: the input
      // handler calls a global (`sign`) that only a test mock would define,
      // so the page loads and idles cleanly but throws on the first tap.
      const ctx = document.getElementById("c").getContext("2d");
      let x = 50;
      let vx = 2;
      window.addEventListener("pointerdown", () => {
        vx = sign(vx) * -2; // ReferenceError in a real browser
      });
      function frame() {
        x += vx;
        if (x < 0 || x > 380) vx = -vx;
        ctx.fillStyle = "#ddd";
        ctx.fillRect(0, 0, 400, 300);
        ctx.fillStyle = "#c33";
        ctx.fillRect(x, 140, 20, 20);
        requestAnimationFrame(frame);
      }
      frame();
    </script>
  </body>
</html>
